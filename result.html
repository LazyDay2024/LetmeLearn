<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LetMeLearn - Summary</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>สรุปเนื้อหา</h1>

    <div class="summary-box" id="summaryText">กำลังโหลดข้อมูล...</div>

    <div class="field">
      <label for="quizCount">ต้องการ Quiz กี่ข้อ</label>
      <input type="number" id="quizCount" min="1" max="20" value="5" />
    </div>

    <div class="quiz-actions">
      <button class="quiz-btn" id="generateBtn" type="button">Generate Quiz</button>
      <button class="close-btn" id="backBtn" type="button">ย้อนกลับ</button>
    </div>
  </div>

  <script src="/static/result.js"></script>
</body>
</html>
