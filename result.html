<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LetMeLearn - Summary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/style.css" />
  <script src="static/theme.js"></script>
</head>

<body>
  <div class="container">
    <button class="back-nav-btn" id="topBackBtn" title="ย้อนกลับ">❮</button>
    <button class="theme-toggle" id="themeToggleBtn">🌙</button>
    <h1>🚀 สร้างแบบทดสอบ</h1>
    <div class="subtitle">ตั้งค่าเงื่อนไขสำหรับสร้าง Quiz ที่ออกแบบมาเพื่อคุณ</div>

    <div id="summarySectionContainer" style="display: none;">
      <h2 class="section-title" style="margin-top: 20px;">📝 สรุปเนื้อหา</h2>
      <div class="summary-box" id="summaryText">กำลังโหลดข้อมูล...</div>
    </div>

    <h2 class="section-title">⚙️ ตั้งค่าการสร้าง Quiz</h2>

    <div class="field">
      <label for="promptRole">
        👔 จำลองว่าเป็นผู้เชี่ยวชาญด้าน
        <span class="tooltip-icon" data-tooltip="เคล็ดลับ: การระบุอาชีพจะทำให้ AI ใช้คำศัพท์และมุมมองที่เหมาะสมกับเรื่องนั้นๆ ได้ดีขึ้น">❔</span>
      </label>
      <input type="text" id="promptRole" placeholder="เช่น ครูสอนคณิตศาสตร์, โปรแกรมเมอร์, หมอ..." />
    </div>

    <div class="field">
      <label for="promptTopic">
        🎯 เนื้อหาที่ต้องการให้สอน
        <span class="tooltip-icon" data-tooltip="ระบุเจาะจงลงไปเลยหัวข้อที่คุณอยากให้จำ เช่น กฎของนิวตัน หรือ การสร้างตัวแปรใน Python">❔</span>
      </label>
      <input type="text" id="promptTopic" placeholder="เช่น แคลคูลัส, การเขียนเว็บ, ชีววิทยา..." />
    </div>

    <div class="field">
      <label for="promptLevel">
        👦 สำหรับระดับชั้น
        <span class="tooltip-icon" data-tooltip="ถ้าคุณพิมพ์ว่า 'ประถม' AI จะพยายามอธิบายเนื้อหาให้ง่ายขึ้นเพื่อเด็กครับ">❔</span>
      </label>
      <input type="text" id="promptLevel" placeholder="เช่น มัธยมปีที่ 6, มหาวิทยาลัยปี 1, อื่นๆ..." />
    </div>

    <div class="field">
      <label for="promptGoal">
        🏁 จุดประสงค์ หรือ ส่วนที่ไม่เข้าใจ
        <span class="tooltip-icon" data-tooltip="หัวใจสำคัญเลย! สั่งไปได้เลยว่าอยากได้โจทย์แบบไหน เช่น ออกโจทย์หลอกเรื่องเครื่องหมายบวกลบ">❔</span>
      </label>
      <textarea id="promptGoal" placeholder="เช่น สร้างโจทย์ไล่จากง่ายไปยาก, ไม่เข้าใจเรื่อง Limit ช่วยอธิบาย..." style="min-height: 80px;"></textarea>
    </div>

    <div class="field">
      <label for="quizCount">
        📊 ต้องการ Quiz กี่ข้อ
        <span class="tooltip-icon" data-tooltip="ไม่เกิน 20 ข้อกำลังดีครับ และอย่าลืมว่าข้อเยอะ AI ก็จะใช้เวลาสร้างนานขึ้น">❔</span>
      </label>
      <div class="number-input-wrapper">
        <button type="button" class="num-btn" id="decreaseBtn">−</button>
        <input type="number" id="quizCount" min="1" max="20" value="5" />
        <button type="button" class="num-btn" id="increaseBtn">+</button>
      </div>
    </div>

    <div class="quiz-actions">
      <button class="quiz-btn" id="generateBtn" type="button">
        <span id="generateBtnText">🚀 Generate Quiz</span>
      </button>
      <button class="close-btn" id="backBtn" type="button">⬅️ ย้อนกลับ</button>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">กำลังให้ AI สร้างแบบทดสอบ...</div>
      <div class="loading-subtext">อาจใช้เวลาสักครู่ โหมดดรอปโชว์รอแป๊บ! ☕️</div>
    </div>
  </div>

  <script src="static/result.js"></script>
</body>

</html>
