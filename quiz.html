<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LetMeLearn - Quiz</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>แบบทดสอบ</h1>
    <div class="subtitle">เลือกคำตอบให้ครบ แล้วกดส่งคำตอบ</div>

    <div id="quizContainer"></div>

    <div class="quiz-footer-actions">

      <button class="close-btn" id="backToResultBtn" type="button">ย้อนกลับ</button>
    </div>

    <div id="scoreBox" class="score-box" style="display: none;"></div>
  </div>

  <script src="/static/quiz.js"></script>
</body>
</html>
